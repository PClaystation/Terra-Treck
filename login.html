<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Continental ID Redirect</title>
  <style>
    :root {
      --bg-top: #0f2020;
      --bg-bottom: #1e3d34;
      --panel: rgba(252, 248, 240, 0.96);
      --panel-border: rgba(17, 29, 29, 0.12);
      --text: #162224;
      --muted: #5a6a6d;
      --accent: #d8b25c;
      --accent-deep: #146f63;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.12), transparent 32%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    .shell {
      width: min(420px, 100%);
      padding: 32px 28px;
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    img {
      width: min(180px, 60%);
      height: auto;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      line-height: 1.55;
      color: var(--muted);
    }

    .actions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 168px;
      padding: 11px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent-deep), #0e544b);
    }

    .secondary {
      color: var(--text);
      background: rgba(22, 111, 99, 0.08);
    }
  </style>
</head>
<body>
  <main class="shell">
    <img src="./images/C2.png" alt="Continental ID" />
    <h1>Redirecting to Continental ID</h1>
    <p id="status">Preparing the real sign-in flow for Terra Tread.</p>
    <div class="actions">
      <a id="continue-link" class="primary" href="#">Continue to sign-in</a>
      <a class="secondary" href="./index.html">Back to game</a>
    </div>
  </main>

  <script>
    const APP_CONTEXT = Object.freeze(window.__TERRA_TREAD_CONTEXT__ || {});
    const AUTH_API_BASE_STORAGE_KEY = "continental.authApiBaseUrl";
    const GAME_API_BASE_STORAGE_KEY = "terraTreck.gameApiBaseUrl";
    const LOCAL_HOSTS = new Set(["localhost", "127.0.0.1"]);
    const TRUSTED_API_ORIGINS = new Set([
      "https://dashboard.continental-hub.com",
      "https://grimoire.continental-hub.com",
      "https://login.continental-hub.com",
      "https://continental-hub.com",
      "https://api.continental-hub.com",
      "https://auth.continental-hub.com",
      "https://id.continental-hub.com",
      "https://backend.continental-hub.com",
      "https://mpmc.ddns.net",
      "https://mpmc.ddns.net:3000",
    ]);
    const LOGIN_POPUP_URL =
      window.__LOGIN_POPUP_URL__ ||
      APP_CONTEXT.loginPopupUrl ||
      "https://login.continental-hub.com/popup.html";
    const FALLBACK_API_BASE_URL =
      window.__API_BASE_URL__ ||
      APP_CONTEXT.authApiBaseUrl ||
      "https://auth.continental-hub.com";
    const FALLBACK_GAME_API_BASE_URL =
      window.__GAME_API_BASE_URL__ || APP_CONTEXT.gameApiBaseUrl || "";

    const safeText = (value) => String(value || "").trim();
    const trimTrailingSlash = (value) => safeText(value).replace(/\/+$/, "");

    function isTrustedApiOrigin(origin) {
      if (!origin) return false;

      try {
        const parsed = new URL(origin);
        return LOCAL_HOSTS.has(parsed.hostname) || TRUSTED_API_ORIGINS.has(parsed.origin);
      } catch {
        return false;
      }
    }

    function resolveTrustedApiBaseUrl(value) {
      if (!value) return "";

      try {
        const resolved = new URL(value, window.location.origin);
        return isTrustedApiOrigin(resolved.origin) ? trimTrailingSlash(resolved.origin) : "";
      } catch {
        return "";
      }
    }

    function getSafeRedirectTarget() {
      const redirectParam = new URLSearchParams(window.location.search).get("redirect");

      if (!redirectParam) {
        return new URL("index.html", window.location.href).toString();
      }

      try {
        const redirectUrl = new URL(redirectParam, window.location.origin);
        return redirectUrl.origin === window.location.origin
          ? redirectUrl.toString()
          : new URL("index.html", window.location.href).toString();
      } catch {
        return new URL("index.html", window.location.href).toString();
      }
    }

    function getApiBaseUrl() {
      const stored = resolveTrustedApiBaseUrl(localStorage.getItem(AUTH_API_BASE_STORAGE_KEY));
      return resolveTrustedApiBaseUrl(stored || FALLBACK_API_BASE_URL) || "";
    }

    function getGameApiBaseUrl() {
      const stored = resolveTrustedApiBaseUrl(localStorage.getItem(GAME_API_BASE_STORAGE_KEY));
      return resolveTrustedApiBaseUrl(stored || FALLBACK_GAME_API_BASE_URL) || "";
    }

    function buildLoginUrl() {
      const target = new URL(LOGIN_POPUP_URL, window.location.href);
      target.searchParams.set("origin", window.location.origin);
      target.searchParams.set("redirect", getSafeRedirectTarget());

      const apiBaseUrl = getApiBaseUrl();
      if (apiBaseUrl) {
        target.searchParams.set("apiBaseUrl", apiBaseUrl);
      }

       const gameApiBaseUrl = getGameApiBaseUrl();
      if (gameApiBaseUrl) {
        target.searchParams.set("gameApiBaseUrl", gameApiBaseUrl);
      }

      return target;
    }

    const status = document.getElementById("status");
    const continueLink = document.getElementById("continue-link");
    const loginUrl = buildLoginUrl();

    continueLink.href = loginUrl.toString();

    window.setTimeout(() => {
      status.textContent = "Opening the Continental ID sign-in page.";
      window.location.replace(loginUrl.toString());
    }, 120);
  </script>
</body>
</html>
